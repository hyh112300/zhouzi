events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # ---- Performance ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 16M;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- Brotli ----
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- Security Headers ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- HTTP → HTTPS Redirect ----
    server {
        listen 80;
        server_name zhouzi.icu www.zhouzi.icu;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS Server ----
    server {
        listen 443 ssl http2;
        server_name zhouzi.icu www.zhouzi.icu;

        # SSL
        ssl_certificate     /etc/letsencrypt/live/zhouzi.icu/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zhouzi.icu/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Root
        root /var/www/html;
        index index.html;

        # ---- Landing Page (Next.js) ----
        location / {
            proxy_pass http://landing:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ---- Blog (VitePress Static) ----
        location /blog {
            alias /var/www/blog;
            try_files $uri $uri.html $uri/index.html /blog/404.html;

            # Static file caching
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
                expires 365d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ---- Next.js Static Assets ----
        location /_next/static {
            proxy_pass http://landing:3000;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # ---- Error Pages ----
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }
    }
}
