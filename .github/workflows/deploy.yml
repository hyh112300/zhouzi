name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing page
        run: pnpm --filter @zhouzi/landing build

      - name: Build blog
        run: pnpm --filter @zhouzi/blog build

      - name: Clean blog dist on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo rm -rf /home/ubuntu/blog-dist
            mkdir -p /home/ubuntu/blog-dist

      - name: Upload blog static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: apps/blog/.vitepress/dist/
          target: /home/ubuntu/blog-dist
          strip_components: 4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/zhouzi
            git pull origin main
            sudo docker compose -f docker/docker-compose.yml build landing
            sudo docker compose -f docker/docker-compose.yml up -d --no-deps landing
            sudo docker compose -f docker/docker-compose.yml exec nginx nginx -s reload || true
            sudo docker image prune -f
