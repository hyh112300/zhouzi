# zhouzi.icu — Nginx 配置
# 首页: Three.js 项目
# 博客: Docusaurus 项目 (/blog/*)

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name zhouzi.icu www.zhouzi.icu;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zhouzi.icu www.zhouzi.icu;

    # SSL 证书 (腾讯云免费证书)
    ssl_certificate /etc/nginx/ssl/zhouzi.icu.pem;
    ssl_certificate_key /etc/nginx/ssl/zhouzi.icu.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 首页 — Three.js 项目
    root /var/www/zhouzi/landing/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 博客 — Docusaurus 项目
    location /blog {
        alias /var/www/zhouzi/blog/build;
        try_files $uri $uri/ /blog/index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip 压缩
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
    }

    # 访问日志
    access_log /var/log/nginx/zhouzi.icu.access.log;
    error_log /var/log/nginx/zhouzi.icu.error.log;
}
